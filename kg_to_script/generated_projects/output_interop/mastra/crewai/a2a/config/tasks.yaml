research_task:
  description: |
    Task where the first agent gathers information. In code: researchTaskId = `research-${Date.now()}` and a message with the researchQuery is sent via a2aClient.sendMessage. The task returns a message/status object and the resulting textual research output is stored in the ResearchResult resource.
  expected_output: 'Completed: research_task'
content_task:
  description: |
    Task where the content-creator agent receives research output and transforms it into an engaging blog post introduction. In the code the prompt is constructed by embedding researchResult into a template and sending via secondA2aClient.sendMessage.
  expected_output: 'Completed: content_task'
initial_query_task:
  description: |
    Task created by sending a message via the A2A client in src/index.ts. The code generates a messageId (message-${Date.now}) and sends the 'query' prompt to the agent. Mastra's A2A implementation may return a Task object rather than a direct message; this behavior is noted but runtime details are not modeled beyond task semantics.
  expected_output: 'Completed: initial_query_task'
