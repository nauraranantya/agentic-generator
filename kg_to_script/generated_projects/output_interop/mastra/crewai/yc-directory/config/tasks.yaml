fetch_yc_directory_task:
  description: Task to retrieve the YC directory dataset using the yc-directory tool.
  expected_output: |
    Array of objects with fields: name (string), longDescription (string), tags (string), industries (string), batch (string).
process_yc_data_task:
  description: |
    Task to process/format the YC directory data for consumption by downstream callers (e.g., filtering, adding batch metadata).
  expected_output: A list of formatted company summaries including name, batch, industries,
    and a one-sentence summary.
