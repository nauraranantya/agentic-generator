user_request_task:
  description: |
    High-level task representing the incoming user prompt that asks for weather in Seattle and the current stock price of Apple (AAPL). This task triggers a workflow that coordinates tool calls to fetch weather and stock data.
  expected_output: |
    Agent should provide combined results for both parts (weather and stock price). Tool results should be incorporated into final agent response.
get_weather_task:
  description: |
    Task representing the action to obtain current weather for a location. Executed by the Weather Tool which returns a structured JSON-like result with temperature, feelsLike, humidity, windSpeed, windGust, conditions, and location.
  expected_output: 'Completed: get_weather_task'
get_stock_price_task:
  description: |
    Task representing the action to obtain the most recent stock close price for a given symbol. Executed by the Stock Price Tool which returns a JSON-like result with symbol and currentPrice.
  expected_output: 'Completed: get_stock_price_task'
