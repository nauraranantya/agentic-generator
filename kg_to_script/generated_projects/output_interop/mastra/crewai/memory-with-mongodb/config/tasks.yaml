chef_initial_recipe_suggestion_task:
  description: |
    In my kitchen I have: pasta, canned tomatoes, garlic, olive oil, and some dried herbs (basil and oregano). What can I make? Please keep your answer brief, only give me the high level steps.
  expected_output: 'Completed: chef_initial_recipe_suggestion_task'
chef_friend_s_ingredients_recipe_suggestion_task:
  description: |
    Now I'm over at my friend's house, and they have: chicken thighs, coconut milk, sweet potatoes, and some curry powder.
  expected_output: 'Completed: chef_friend_s_ingredients_recipe_suggestion_task'
chef_memory_query_task_asks_what_was_cooked_earlier:
  description: What did we cook before I went to my friends house?
  expected_output: 'Completed: chef_memory_query_task_asks_what_was_cooked_earlier'
chat_initial_system_message_task:
  description: |
    Chat with user started now ${new Date().toISOString()}. Don't mention this message. This means some time may have passed between this message and the one before. The user left and came back again. Say something to start the conversation up again.
  expected_output: 'Completed: chat_initial_system_message_task'
chat_interactive_loop_task:
  description: Chat Interactive Loop Task
  expected_output: 'Completed: chat_interactive_loop_task'
