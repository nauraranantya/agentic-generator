append_text_parts_to_the_response_text_state:
  description: |
    Each onTextPart callback appends the delivered text fragment to responseText. This task is repeated as streaming text parts arrive and results in updating the UI display region.
  expected_output: 'Completed: append_text_parts_to_the_response_text_state'
user_submits_message:
  description: |
    User types text into the UI textarea and clicks Send; triggers setting isStreaming flag, clears previous responseText, and calls streamIt with prompt equal to the message.
  expected_output: 'Completed: user_submits_message'
stream_message_to_agent:
  description: |
    The agent.stream call is invoked with { messages: prompt, clientTools: clientSideToolCallsMap }. This initiates a streaming response from the language model which may include tool call events and text parts.
  expected_output: 'Completed: stream_message_to_agent'
process_streamed_events_tool_calls_tool_results_deltas_text_parts:
  description: |
    The client processes the streaming response using response.processDataStream callbacks: onToolCallPart, onToolResultPart, onToolCallDeltaPart, onTextPart. onTextPart appends string parts to responseText. onToolCallPart executes matching client tool by name and args.
  expected_output: 'Completed: process_streamed_events_tool_calls_tool_results_deltas_text_parts'
execute_change_color_tool:
  description: |
    When a tool call part for toolName 'changeColor' is received, the client executes the tool's execute function with args (props.color) which sets the application color state.
  expected_output: 'Completed: execute_change_color_tool'
execute_change_logo_size_tool:
  description: |
    Tool call for 'changeLogoSize' triggers execute with args { height, width } and updates logo size state.
  expected_output: 'Completed: execute_change_logo_size_tool'
execute_add_post_tool:
  description: |
    Tool call for 'addPost' triggers execute with args { color, name } and appends a post object to the posts array.
  expected_output: 'Completed: execute_add_post_tool'
stream_it_function_logic_description:
  description: |
    Function streamIt obtains agent via client.getAgent('agent'), calls agent.stream with messages and clientTools; awaits a response object and calls response.processDataStream with handlers: onToolCallPart (executes tool from clientSideToolCallsMap using part.toolName and part.args), onToolResultPart (logs result), onToolCallDeltaPart (logs delta), onTextPart (appends text fragments to responseText state). The function also updates UI streaming flags and manages responseText clearing prior to start.
  expected_output: 'Completed: stream_it_function_logic_description'
