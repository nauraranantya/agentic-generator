task_initial_ingredients_query:
  description: |
    User asks: 'In my kitchen I have: pasta, canned tomatoes, garlic, olive oil, and some dried herbs (basil and oregano). What can I make? Please keep your answer brief, only give me the high level steps.' This is passed as input to chefAgent.stream with threadId and resourceId context.
  expected_output: High-level steps only; brief response requested.
task_ingredients_at_friend_s_house:
  description: |
    User asks: 'Now I'm over at my friend's house, and they have: chicken thighs, coconut milk, sweet potatoes, and some curry powder.' This is passed to chefAgent.stream with same threadId/resourceId to append to conversation memory.
  expected_output: 'Completed: task_ingredients_at_friend_s_house'
task_ask_what_we_cooked_before:
  description: |
    User asks: 'What did we cook before I went to my friends house?' This demonstrates memory recall options with memoryOptions: lastMessages=false and semanticRecall configured.
  expected_output: Expect agent to recall prior conversation content; memoryOptions
    override in call.
task_memory_agent_recall_operation:
  description: |
    Memory agent performs semantic recall according to configured memory options and may ask for user identification when missing.
  expected_output: Start or re-start a conversation politely; if no other messages,
    treat as a new conversation.
exit:
  description: |
    Represents termination of the script after example interactions (process.exit in index.ts). Modeled as a conceptual task reflecting end of workflow.
  expected_output: 'Completed: exit'
