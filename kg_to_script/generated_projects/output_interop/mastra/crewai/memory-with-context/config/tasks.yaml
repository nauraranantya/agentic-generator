task_initial_system_message:
  description: |
    On session start the program sends a system-role message; uses prompt_system_firstChat if isFirstChat, otherwise prompt_system_returningChat. The timestamp is inserted at runtime.
  expected_output: Do not reveal the system-internal timestamp insertion.
task_receive_user_input:
  description: |
    A blocking read from a human input channel; in code this is achieved by Readline and awaiting user's input, then the input is forwarded to the agent.stream call.
  expected_output: 'Completed: task_receive_user_input'
task_agent_stream_response:
  description: |
    Agent processes the user's message, streams text output. During streaming the implementation masks two tag sections: 'think' (internal chain-of-thought-like output) and 'working_memory' (memory saving operations). Spinners (status indicators) are displayed while sections stream; upon end spinners succeed and input reading resumes. The stream also interacts with the Memory component for saving/retrieving conversation context.
  expected_output: 'Completed: task_agent_stream_response'
task_interactive_chat:
  description: |
    Represents the continuous interactive chat loop. Behavior: on start, an initial system message is sent (template varies depending on whether isFirstChat is true). Then user messages are read and the agent produces streaming responses. The agent uses memory.getThreadById to detect returning users and modifies the initial system prompt accordingly.
  expected_output: Do not reveal the system-internal timestamp insertion.
task_agent_instantiation:
  description: |
    Describes Agent constructor parameters used in source: id='memory-agent', name='Memory Agent', instructions (see prompt_instructions), model=openai('gpt-4o-mini'), memory configured (memory_kb).
  expected_output: 'Completed: task_agent_instantiation'
