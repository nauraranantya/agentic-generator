task_propose_change:
  description: |
    Render the proposed change (code diff / description) to the user and request an explicit accept or reject decision.
  expected_output: User selects either 'Accepted' or 'Rejected'.
task_user_decision:
  description: |
    User evaluates the proposed change and selects accept or reject; the selection drives subsequent tool calls and UI state.
  expected_output: 'User decision: ''Accepted'' or ''Rejected''.'
task_handle_accept:
  description: |
    On accept: call the update_file tool with ACCEPTED_CHANGE_CONTENT and submit a human confirmation message 'Accepted change. ...'.
  expected_output: Update tool response and confirmation message.
task_handle_reject:
  description: |
    On reject: call the update_file tool with REJECTED_CHANGE_CONTENT (or do not apply change) and submit a human message 'Rejected change.'.
  expected_output: Rejection confirmation message.
task_finalize_ui:
  description: |
    Render final accepted or rejected status in the UI and present an artifact view of the proposed change.
  expected_output: 'Final UI state: Accepted Change or Rejected Change.'
