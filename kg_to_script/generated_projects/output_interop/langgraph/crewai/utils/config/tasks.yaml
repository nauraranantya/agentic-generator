capitalize_sentence_task:
  description: |
    Task: Capitalize the first letter of each word in a provided sentence-like string. Conceptual behavior: split input string on space characters, for each token convert the first character to uppercase and append the rest of the token unchanged, then join tokens using a single space to produce the output string.
  expected_output: string output (sentence with each word capitalized)
capitalize_task:
  description: |
    Task: Capitalize the first letter of a string (typically a single word). Conceptual behavior: take the string, replace its first character with its uppercase equivalent, and append the remaining substring unchanged.
  expected_output: string output (first letter capitalized)
format_messages_task:
  description: |
    Task: Serialize an array of BaseMessage objects into a single formatted string. Behavior summary: for each message in the array, determine its role by calling the message's getType() operation, obtain the message content; if content is a string, use it directly, otherwise serialize the content with JSON.stringify; then wrap the content in an XML-like tag using the role as the tag name and an index attribute, concatenating all formatted message blocks separated by newlines.
  expected_output: string (XML-like wrapped message blocks)
