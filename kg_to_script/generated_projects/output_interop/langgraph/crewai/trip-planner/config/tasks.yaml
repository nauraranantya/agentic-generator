view_accommodations_task:
  description: Display available accommodations or restaurants to the user and allow
    selection.
  expected_output: A list of accommodation summary items suitable for a UI carousel/list.
select_accommodation_task:
  description: |
    Handle user selection of an accommodation and present detailed view including price breakdown and booking option.
  expected_output: Selected accommodation details and a ready-to-send booking payload.
confirm_booking_task:
  description: Prepare order details and invoke the booking tool using the 'book-accommodation'
    tool call.
  expected_output: Tool call with serialized booking order; subsequent human confirmation
    message.
booked_confirmation_task:
  description: |
    Display booking confirmation details returned by the booking tool or show success message if no details returned.
  expected_output: A confirmation view or message; optionally a booking reference.
