write_email_generate_draft:
  description: |
    Generates a draft email (subject, body, to) by invoking the LLM with the Write Email Prompt and a tool named "write_email" implementing the sendEmailSchema. If insufficient information, prompts the user for missing information. Produces Draft Email resource and a model response message.
  expected_output: 'Completed: write_email_generate_draft'
rewrite_email_apply_user_s_requested_changes:
  description: |
    Rewrites a previously generated draft email in response to a human 'response' action. It uses the Rewrite Email Prompt with substitution of the current draft and the human response text; it calls the same structured tool (write_email) and returns a new Draft Email resource. Implementation enforces: only proceed if humanResponse.args is a string and an existing email exists; otherwise error.
  expected_output: 'Completed: rewrite_email_apply_user_s_requested_changes'
ignore:
  description: |
    Presents the current draft email to a human actor with allowed actions: ignore, response, edit, accept. If 'ignore' or no response -> ends conversation. If 'response' -> passes human text to rewriteEmail. If 'accept' or 'edit' (with structured args) -> may send or update the draft depending on edit content. Implementation validates edits contain subject, body, to when edit action used.
  expected_output: 'Completed: ignore'
send_email_finalize_send:
  description: |
    Finalizes and sends the email. In the implementation this yields a confirmation AI message 'Successfully sent email.' and produces a SentEmailRecord resource. This task is reached when the human accepts or when routing logic selects sending directly.
  expected_output: 'Completed: send_email_finalize_send'
