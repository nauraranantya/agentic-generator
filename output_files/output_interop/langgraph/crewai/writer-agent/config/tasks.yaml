prepare_task:
  description: |
    Binds the tool 'draft_text_document' with the model and streams its output (initStream). If state.context.writer.selected is present, a system message of 'Selected text in question: <selected>' is prepended. As model stream chunks arrive, tool call arguments (title, description) are extracted and a UI 'writer' component is populated with these arguments and isGenerating=true. Produces a draft candidate resource representing the tool call output.
  expected_output: 'The tool should return a tool call with args matching schema {
    title: string, description: string }'
write_task:
  description: |
    Generates the final text document content. Uses a non-streaming model invocation (tags ['nostream']) in implementation to get full content; however the code also uses a streaming invocation to update UI content progressively. System instruction: 'Write a text document based on the user's request. Only output the content, do not ask any additional questions.' If state.context.writer.selected is present the selected text is appended to the system instruction. Consumes conversation history and tool outputs; produces the final document content resource (FinalTextDocument).
  expected_output: A single AI message containing the document content (only content,
    no additional questions).
suggestions_task:
  description: |
    Takes the last AI message; for each tool call in the message, emits a tool-type message 'Finished' referencing the tool_call id. Then invokes the model with the updated messages and appends the model's finish message to the conversation. This step does non-streaming invocation in the implementation (model.invoke).
  expected_output: An AI finish message appended to the conversation.
