open_buy_ui_task:
  description: Prepare and present the buy stock UI to the user.
  expected_output: ui_opened
execute_purchase_task:
  description: Execute the purchase by invoking the buy-stock tool with purchaseDetails.
  expected_output: 'purchaseDetails object with fields: ticker (string), quantity
    (integer), price (number)'
confirm_purchase_task:
  description: Display purchase confirmation to the user including executed quantity
    and price.
  expected_output: confirmation_message
