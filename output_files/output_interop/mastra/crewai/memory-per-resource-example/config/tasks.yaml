task_start_conversation:
  description: "Start a new conversation thread. System message template (in source):\n\
    `New conversation thread started at ${new Date().toISOString()}. \nThis may be\
    \ a returning user - check your working memory to see if you know them already.\n\
    If this is a new user, introduce yourself and learn about them.\nIf this is a\
    \ returning user, greet them warmly and reference what you remember!` \nThis message\
    \ is generated at runtime with a timestamp; represented here as a template.\n"
  expected_output: Expect agent to check memory, greet user, and either introduce
    or reference remembered details.
task_update_memory:
  description: |
    Inspect conversation content and persist updates to per-resource working memory. Source code expects the agent to output updates wrapped with <working_memory> tags; updates are masked in the stream and persisted to LibSQL. UI uses a spinner during persistence but streaming semantics are an implementation detail (not modeled).
  expected_output: Text containing <working_memory>...</working_memory> sections following
    the template.
task_interactive_chat:
  description: |
    Receive user messages, call the agent with memory context (resource + thread), stream responses to the user. The loop terminates when the user types 'exit' or 'quit'. The code obtains user input via Readline; runtime specifics are not modeled. The agent should use stored working memory where relevant.
  expected_output: Agent conversational reply or termination acknowledgment.
