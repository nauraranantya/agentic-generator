search_crypto_coins_task:
  description: Semantic task corresponding to the searchCryptoCoins tool.
  expected_output: 'Returns an object for a coin (example fields: id, symbol, name)
    or null.'
get_crypto_price_task:
  description: Semantic task corresponding to the getCryptoPrice tool.
  expected_output: Returns an object with market data for the coin (price, market
    cap, etc.) or null.
get_historical_crypto_prices_task:
  description: Semantic task corresponding to the getHistoricalCryptoPrices tool.
  expected_output: Returns an array of objects with timestamp and price fields for
    the historical series.
