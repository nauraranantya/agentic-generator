task_recipe_suggest_initial_query:
  description: |
    Agent.stream called with Prompt_Index_WhatCanIMake; ChefAgent produces short high-level steps. The call includes threadId and resourceId parameters to enable memory association.
  expected_output: A short list of possible recipes with high-level steps.
task_chat_start_conversation:
  description: |
    On startup a system message (Prompt_Chat_SystemStart) is sent to the memory agent. This is used to re-engage a returning user and may include a dynamic timestamp.
  expected_output: A short re-engagement message to the user.
task_recipe_suggest_friends_house_query:
  description: |
    Agent.stream called with Prompt_Index_FriendsHouse to produce alternative recipes. Uses same threadId and resourceId as previous to keep memory context.
  expected_output: Recipe suggestions appropriate to the listed ingredients.
task_chat_interactive_message:
  description: |
    Loop of receiving a user message and calling memoryAgent.stream(prompt, { memory: { thread, resource } }). The user message is forwarded as Prompt_Chat_UserMessage_Template at runtime with concrete content.
  expected_output: 'Completed: task_chat_interactive_message'
task_recipe_suggest_recall_previous:
  description: |
    Agent.stream called with Prompt_Index_RecallPrevious requesting recall using memoryOptions.lastMessages = 3.
  expected_output: A concise recall of previous recipe(s) recommended within last
    messages.
