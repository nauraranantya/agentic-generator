invoke_nested_data_processing_workflow:
  description: |
    Invokes nested workflow 'data-processing' with input schema { inputValue: number } and expects output { isEven: boolean }.
  expected_output: '{"outputSchema": { "isEven": "boolean" } }'
step_one_task_double_input:
  description: |
    Execution logic: await delay(10000); doubledValue = inputData.inputValue * 2; return { doubledValue }.
  expected_output: '{"outputSchema": { "doubledValue": "number" }, "example": { "doubledValue":
    60 } }'
resume_increment:
  description: |
    Execution logic: if (!resumeData?.extraNumber) { await suspend({}); return { incrementedValue: 0 }; } else { incrementedValue = inputData.doubledValue + 1 + resumeData.extraNumber; return { incrementedValue }; }
  expected_output: |
    {"outputSchema": { "incrementedValue": "number" }, "examples": { "suspendedReturn": { "incrementedValue": 0 }, "onResume": { "incrementedValue": 66 } } }
step_three_task_triple_incremented_value:
  description: 'Execution logic: tripledValue = inputData.incrementedValue * 3; return
    { tripledValue }.'
  expected_output: '{"outputSchema": { "tripledValue": "number" }, "example": { "tripledValue":
    198 } }'
step_four_task_is_even_check:
  description: 'Execution logic: isEven = (inputData.tripledValue % 2 === 0); return
    { isEven }.'
  expected_output: '{"outputSchema": { "isEven": "boolean" }, "example": { "isEven":
    true } }'
