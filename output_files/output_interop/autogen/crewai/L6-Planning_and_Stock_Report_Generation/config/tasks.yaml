task_initiate_write_blog:
  description: Initial user task message used to start the groupchat planning and
    execution.
  expected_output: |
    A blogpost in markdown analyzing Nvidia's past-month stock performance, with relevant charts or code results if available.
task_planner_plan:
  description: Planner's task to decompose the initial blogpost task into retrievable
    Python-code-based steps.
  expected_output: A list of ordered, executable steps for data retrieval and analysis.
task_engineer_write_code:
  description: Engineer tasked to implement code per the planner's steps.
  expected_output: |
    Python scripts or code snippets that retrieve and preprocess data, compute metrics, and produce figures or tables.
task_executor_run_code:
  description: Executor runs the engineer's code and reports outputs.
  expected_output: Execution logs, produced files (data, charts), and error reports.
task_writer_produce_blog:
  description: Writer composes the final blogpost using execution outputs and admin
    feedback.
  expected_output: Final blogpost in markdown ready for publishing.
